name: Linux
on:
  push:
    branches: ['*']
    tags-ignore: ['*']
  pull_request:

jobs:
  raku:
    strategy:
      matrix:
        os: ['ubuntu-latest']
        raku-version: ['latest', '2025.12']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: Raku/setup-raku@v1
        with:
          raku-version: ${{ matrix.raku-version }}
      - name: Install dependencies
        run: |
          zef install --force LibraryMake
          zef install --deps-only .
          zef build .
      - name: Run tests
        run: zef test -v .
